<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Mail | L&T Mailbox</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
:root{
  --primary:#0a2b5f;
  --primary-dark:#081f45;
  --accent:#2563eb;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --radius:18px;
  --shadow:0 18px 40px rgba(15,23,42,.10);
  --shadow-hover:0 24px 48px rgba(15,23,42,.12);
  --gradient-primary:linear-gradient(135deg,var(--primary),var(--primary-dark));
  --glass-bg:rgba(255,255,255,0.95);
  --glass-border:rgba(255,255,255,0.2);
  scrollbar-width:thin;
  scrollbar-color:rgba(15,23,42,0.1) transparent;
}

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,"Segoe UI",system-ui,sans-serif;
}
html{
  scroll-behavior:smooth;
}
body{
  background:linear-gradient(135deg,#f0f4f8 0%,#f8fafc 50%,#f1f5f9 100%);
  color:var(--text);
  overflow-x:hidden;
  font-feature-settings:"kern" 1,"liga" 1;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  top:-50%;
  right:-20%;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(37,99,235,0.08) 0%,transparent 70%);
  border-radius:50%;
  z-index:-1;
  animation:float 15s ease-in-out infinite;
}

@media(max-width:768px){
  html{
    overflow-x:hidden;
  }
  body{
    width:100vw;
    overflow-x:hidden;
    position:relative;
  }
}

/* ================= HEADER (PREMIUM STYLE) ================= */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:linear-gradient(135deg,#0a2b5f 0%,#1e3a8a 100%);
  padding:16px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 15px 40px rgba(15,23,42,0.12);
  backdrop-filter:blur(30px);
  border-bottom:1px solid rgba(255,255,255,0.15);
  animation:slideDown 0.5s ease-out;
}

@keyframes slideDown {
  from {
    opacity:0;
    transform:translateY(-20px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}

.logo{
  height:60px;
  background:linear-gradient(135deg,#fff,#f8fafc);
  padding:8px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(15,23,42,0.04);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  cursor:pointer;
  animation:fadeInUp 0.6s ease-out;
}

.logo:hover{
  transform:scale(1.1) translateY(-3px);
  box-shadow:0 10px 30px rgba(15,23,42,0.12);
}

/* ================= NAV ================= */
.nav{
  display:flex;
  gap:16px;
  align-items:center;
  animation:fadeInUp 0.6s ease-out 0.1s both;
}

.nav a{
  color:#e0e7ff;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  position:relative;
  padding:11px 20px;
  border-radius:12px;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  overflow:hidden;
}

.nav a::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s ease;
}

.nav a::after{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  width:0;
  height:2px;
  background:linear-gradient(90deg,rgba(255,255,255,0.5),rgba(255,255,255,0.8));
  transition:width 0.3s cubic-bezier(0.4,0,0.2,1);
}

.nav a:hover{
  background:rgba(255,255,255,0.15);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  color:#fff;
  border-color:rgba(255,255,255,0.3);
}

.nav a:hover::before{
  left:100%;
}

.nav a:hover::after,
.nav a.active::after{
  width:100%;
}

.nav a.active{
  background:rgba(255,255,255,0.2);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  color:#fff;
  border-color:rgba(255,255,255,0.4);
}

.logout{
  color:#ffd1d1;
  background:rgba(255,255,255,0.1);
}

.logout:hover{
  background:rgba(255,255,255,0.2);
  color:#fff;
  border-color:rgba(255,255,255,0.3);
}

/* ================= HAMBURGER ================= */
.hamburger{
  display:none;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
  padding:10px;
  border-radius:12px;
  transition:all 0.3s ease;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
}

.hamburger:hover{
  background:rgba(255,255,255,0.2);
  box-shadow:0 2px 8px rgba(15,23,42,0.04);
}

.hamburger span{
  width:24px;
  height:2.5px;
  background:#fff;
  border-radius:2px;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  transform-origin:center;
}

.hamburger.open span:nth-child(1){
  transform:rotate(45deg) translate(8px,8px);
}

.hamburger.open span:nth-child(2){
  opacity:0;
  transform:translateX(-10px);
}

.hamburger.open span:nth-child(3){
  transform:rotate(-45deg) translate(7px,-7px);
}

/* ================= HEADER MOBILE FIX ================= */
@media(max-width:768px){
  .header{
    box-shadow:none !important;
    backdrop-filter:none !important;
    border-bottom:1px solid rgba(255,255,255,0.05) !important;
    padding:12px 16px;
  }
}

/* ================= MOBILE NAV ================= */
@media(max-width:768px){
  .hamburger{display:flex;}
  .nav{
    position:fixed;
    top:0;
    left:-300px;
    height:100vh;
    width:300px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    flex-direction:column;
    padding-top:100px;
    transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow:none;
    backdrop-filter:blur(10px);
  }
  body.nav-open::before{
    content:'';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:999;
  }
  .nav.open{
    left:0;
  }
  .nav a{
    padding:16px 24px;
    margin:4px 16px;
    border-radius:12px;
    border-bottom:none;
    transition:all 0.3s ease;
  }
  .nav a:hover{
    background:rgba(255,255,255,0.15);
    transform:translateX(8px);
  }
}
.page-head {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  justify-content: space-between;
  align-items: flex-start;
  padding: 24px 0 12px;
}

.page-head h1 {
  margin: 0;
  font-size: clamp(2rem, 2.4vw, 2.4rem);
}

.page-head p {
  margin: 8px 0 0;
  max-width: 760px;
  color: var(--muted);
  line-height: 1.7;
}

.mail-layout {
  display: grid;
  grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
  gap: 24px;
  margin-top: 18px;
}

.mail-list {
  background: var(--card-bg);
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  box-shadow: 0 18px 50px rgba(15,23,42,.06);
  overflow: hidden;
}

.mail-list .panel-head {
  padding: 22px 24px;
  border-bottom: 1px solid #eff6ff;
}

.mail-tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.tab {
  border: 1px solid #cbd5e1;
  border-radius: 999px;
  background: white;
  color: #334155;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: var(--accent);
  color: #ffffff;
  border-color: transparent;
}

.mail-item {
  display: grid;
  gap: 10px;
  padding: 18px 22px;
  border-bottom: 1px solid #f1f5f9;
  cursor: pointer;
  transition: background .2s, transform .2s;
}

.mail-item:last-child {
  border-bottom: none;
}

.mail-item:hover {
  background: #f8fbff;
  transform: translateX(1px);
}

.mail-item.active {
  background: var(--accent-soft);
}

.mail-item .sender {
  font-weight: 700;
  color: #0f172a;
}

.mail-item .subject {
  color: #334155;
  font-size: 14px;
}

.mail-item .preview {
  color: var(--muted);
  font-size: 13px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.mail-item .time {
  color: #94a3b8;
  font-size: 12px;
}

.mail-panel {
  background: var(--card-bg);
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  box-shadow: 0 18px 50px rgba(15,23,42,.06);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.mail-panel .panel-head {
  padding: 24px;
  border-bottom: 1px solid #eff6ff;
}

.mail-panel .panel-body {
  padding: 0 24px 24px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.mail-meta {
  display: grid;
  gap: 8px;
  margin-bottom: 22px;
}

.mail-meta .subject-title {
  margin: 0;
  font-size: 1.7rem;
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  color: #64748b;
  font-size: 14px;
}

.badge {
  background: #eef2ff;
  color: #1d4ed8;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.email-body {
  color: #334155;
  line-height: 1.9;
  white-space: pre-line;
  margin-bottom: 22px;
}

.attachment-card {
  border: 1px solid #dbeafe;
  border-radius: 18px;
  background: #f8fbff;
  overflow: hidden;
  margin-bottom: 22px;
}

.attachment-card img {
  width: 100%;
  display: block;
  object-fit: cover;
}

.attachment-card .attachment-info {
  padding: 16px;
}

.attach-title {
  margin: 0 0 8px;
  font-weight: 700;
}

.attach-desc {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.reply-bar {
  margin-top: auto;
  display: grid;
  gap: 12px;
}

.reply-bar textarea {
  width: 100%;
  min-height: 130px;
  border: 1px solid #cbd5e1;
  border-radius: 18px;
  padding: 18px;
  resize: vertical;
  font-family: Inter, sans-serif;
}

.reply-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.reply-actions button {
  border: none;
  border-radius: 14px;
  padding: 12px 18px;
  font-weight: 700;
  cursor: pointer;
}

.reply-actions .send {
  background: var(--accent);
  color: white;
}

.reply-actions .discard {
  background: #e2e8f0;
  color: #334155;
}

@media (max-width: 860px) {
  .mail-layout { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .header-bar { flex-direction: column; align-items: stretch; }
  .header-bar nav { justify-content: center; }
}

/* ================= PREMIUM MAIL EXPERIENCE ================= */
:root{
  --primary:#09245a;
  --primary-dark:#061733;
  --accent:#1976d2;
  --accent-2:#00a3a3;
  --accent-soft:#e8f2ff;
  --ink:#101828;
  --muted:#667085;
  --line:#d9e2ef;
  --panel:rgba(255,255,255,.88);
  --panel-strong:#ffffff;
  --shadow:0 24px 70px rgba(9,36,90,.14);
  --shadow-hover:0 26px 80px rgba(9,36,90,.2);
  --radius:22px;
}

body{
  min-height:100vh;
  background:
    linear-gradient(120deg,rgba(9,36,90,.08),transparent 34%),
    linear-gradient(240deg,rgba(0,163,163,.1),transparent 30%),
    #f4f8fd;
}

body::before{
  top:auto;
  right:auto;
  left:-18vw;
  bottom:-30vh;
  width:56vw;
  height:56vw;
  min-width:420px;
  min-height:420px;
  background:
    radial-gradient(circle at 35% 35%,rgba(25,118,210,.22),transparent 44%),
    radial-gradient(circle at 70% 62%,rgba(0,163,163,.18),transparent 42%);
  filter:blur(6px);
  opacity:.82;
  animation:premiumFloat 16s ease-in-out infinite alternate;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
  background:
    radial-gradient(circle at 88% 18%,rgba(9,36,90,.16),transparent 26%),
    linear-gradient(rgba(9,36,90,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(9,36,90,.045) 1px,transparent 1px);
  background-size:auto,44px 44px,44px 44px;
  animation:mailGridMove 22s linear infinite;
}

@keyframes premiumFloat{
  from{transform:translate3d(0,0,0) scale(1);}
  to{transform:translate3d(9vw,-5vh,0) scale(1.08);}
}

@keyframes mailGridMove{
  from{background-position:0 0,0 0,0 0;}
  to{background-position:0 0,44px 44px,44px 44px;}
}

.header{
  background:rgba(6,23,51,.88);
  padding:12px clamp(16px,3vw,34px);
  box-shadow:0 18px 55px rgba(6,23,51,.2);
  border-bottom:1px solid rgba(255,255,255,.14);
}

.logo{
  height:52px;
  border-radius:12px;
  box-shadow:0 12px 26px rgba(0,0,0,.16);
}

.nav{
  gap:8px;
}

.nav a{
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:10px 15px;
  font-size:13px;
  color:#edf5ff;
  background:rgba(255,255,255,.05);
}

.nav a:hover,
.nav a.active{
  transform:translateY(-1px);
  background:rgba(255,255,255,.16);
  box-shadow:0 10px 28px rgba(0,0,0,.22);
}

.container{
  max-width:1440px;
  padding:22px clamp(14px,3vw,32px) 38px;
}

.page-head{
  position:relative;
  align-items:center;

}

.page-head h1{

const mailList = document.getElementById('mailList');
const subjectEl = document.getElementById('subject');
const senderEl = document.getElementById('sender');
const timeEl = document.getElementById('time');
const bodyEl = document.getElementById('body');
const attachmentEl = document.getElementById('attachment');
const replyBox = document.getElementById('replyBox');
const mailSearch = document.getElementById('mailSearch');
const mailCount = document.getElementById('mailCount');
const unreadCount = document.getElementById('unreadCount');
const allTab = document.getElementById('allTab');
const unreadTab = document.getElementById('unreadTab');
const mailStateBtn = document.getElementById('mailStateBtn');
const readStorageKey = 'companymail.readMailIndexes.v1';
const readMails = new Set(loadReadMails());
let activeFilter = 'all';
let currentSearch = '';
let currentMailIndex = null;

function loadReadMails() {
  try {
    const saved = JSON.parse(localStorage.getItem(readStorageKey) || '[]');
    return Array.isArray(saved) ? saved.filter(Number.isInteger) : [];
  } catch {
    return [];
  }
}

function saveReadMails() {
  localStorage.setItem(readStorageKey, JSON.stringify([...readMails]));
}

function loadMails(filterText = '') {
  mailList.innerHTML = '';
  currentSearch = filterText;
  const query = currentSearch.trim().toLowerCase();
  const visibleMails = emails
    .map((mail, index) => ({ mail, index }))
    .filter(({ mail }) => {
      const haystack = `${mail.sender} ${mail.subject} ${mail.time} ${mail.preview || ''} ${mail.body || ''}`.toLowerCase();
      return !query || haystack.includes(query);
    })
    .filter(({ index }) => {
      return activeFilter === 'all' || !readMails.has(index);
    });

  mailCount.innerText = `${visibleMails.length} mails`;
  updateUnreadControls();

  visibleMails.forEach(({ mail, index }) => {
    const item = document.createElement('article');
    const isUnread = !readMails.has(index);
    item.className = `mail-item ${isUnread ? 'unread' : 'read'}`;
    item.setAttribute('data-initial', getInitials(mail.sender));
    item.dataset.index = index;
    item.innerHTML = `
      <div class="sender">${mail.sender}</div>
      <div class="subject">${mail.subject}</div>
      <div class="preview">${getMailPreview(mail)}</div>
      ${isUnread ? '<div class="unread-pill">Unread</div>' : ''}
      <div class="time">${mail.time}</div>
    `;
    item.addEventListener('click', () => openMail(index, item));
    mailList.appendChild(item);
  });

  const firstMail = mailList.querySelector('.mail-item');
  if (firstMail) {
    openMail(visibleMails[0].index, firstMail, false);
  } else {
    subjectEl.innerText = 'No matching email found';
    senderEl.innerHTML = 'From: <strong>Mail team</strong>';
    timeEl.innerText = '-';
    bodyEl.innerText = 'Try another keyword to find the message you need.';
    attachmentEl.innerHTML = '';
    currentMailIndex = null;
    updateMailStateButton();
    document.body.classList.remove('mail-reading');
  }
}

function updateUnreadControls() {
  const unreadTotal = emails.filter((_, index) => !readMails.has(index)).length;
  unreadCount.innerText = unreadTotal;
  allTab.classList.toggle('active', activeFilter === 'all');
  unreadTab.classList.toggle('active', activeFilter === 'unread');
  updateMailStateButton();
}

function updateMailStateButton() {
  if (currentMailIndex === null) {
    mailStateBtn.hidden = true;
    return;
  }
  const isRead = readMails.has(currentMailIndex);
  mailStateBtn.hidden = false;
  mailStateBtn.innerText = isRead ? 'Mark unread' : 'Mark read';
}

function getInitials(name = '') {
  return name
    .replace(/\([^)]*\)/g, '')
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map(part => part[0] || '')
    .join('')
    .toUpperCase() || 'M';
}

function getMailPreview(mail) {
  const text = mail.preview || mail.body || '';
  return text.replace(/\s+/g, ' ').trim().slice(0, 150);
}

function openMail(index, element, showReader = true) {
  document.querySelectorAll('.mail-item').forEach(node => node.classList.remove('active'));
  element.classList.add('active');
  currentMailIndex = index;
  if (showReader) {
    readMails.add(index);
    saveReadMails();
    element.classList.remove('unread');
    element.classList.add('read');
    const pill = element.querySelector('.unread-pill');
    if (pill) pill.remove();
    updateUnreadControls();
    document.body.classList.add('mail-reading');
  }

  const mail = emails[index];
  subjectEl.innerText = mail.subject;
  senderEl.innerHTML = `From: <strong>${mail.sender}</strong>`;
  timeEl.innerText = mail.time;
  bodyEl.innerText = mail.body;

  if (mail.attachment) {
    attachmentEl.innerHTML = `
      <div class="attachment-card">
        <img src="${mail.attachment.src}" alt="${mail.attachment.name}">
        <div class="attachment-info">
          <p class="attach-title">${mail.attachment.name}</p>
          <p class="attach-desc">${mail.attachment.description}</p>
        </div>
      </div>
    `;
  } else {
    attachmentEl.innerHTML = '';
  }
  updateMailStateButton();
}

function closeMail() {
  document.body.classList.remove('mail-reading');
}

function toggleCurrentMailState() {
  if (currentMailIndex === null) return;
  if (readMails.has(currentMailIndex)) {
    readMails.delete(currentMailIndex);
  } else {
    readMails.add(currentMailIndex);
  }
  saveReadMails();
  loadMails(currentSearch);
  const currentItem = [...document.querySelectorAll('.mail-item')]
    .find(item => Number(item.dataset.index) === currentMailIndex);
  if (currentItem) {
    openMail(currentMailIndex, currentItem, false);
  } else {
    updateUnreadControls();
  }
}

function sendReply() {
  if (!replyBox.value.trim()) return;
  alert('Reply Sent ✅');
  replyBox.value = '';
}

function discardReply() {
  replyBox.value = '';
}

loadMails();

if (mailSearch) {
  mailSearch.addEventListener('input', event => loadMails(event.target.value));
}

allTab.addEventListener('click', () => {
  activeFilter = 'all';
  loadMails(currentSearch);
});

unreadTab.addEventListener('click', () => {
  activeFilter = activeFilter === 'unread' ? 'all' : 'unread';
  loadMails(currentSearch);
});

mailStateBtn.addEventListener('click', toggleCurrentMailState);

// Hamburger Menu Toggle
const hamburger = document.querySelector('.hamburger');
const nav = document.querySelector('.nav');
if (hamburger && nav) {
  const toggleNav = () => {
    nav.classList.toggle('open');
    hamburger.classList.toggle('open');
    document.body.classList.toggle('nav-open', nav.classList.contains('open'));
  };

  const closeNav = () => {
    nav.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.classList.remove('nav-open');
  };

  hamburger.addEventListener('click', toggleNav);
  hamburger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleNav();
    }
  });
  nav.querySelectorAll('a').forEach(link => link.addEventListener('click', closeNav));
  document.addEventListener('click', e => {
    if (!nav.classList.contains('open')) return;
    if (nav.contains(e.target) || hamburger.contains(e.target)) return;
    closeNav();
  });
}
</script>
