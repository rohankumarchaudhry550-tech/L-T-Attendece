<style>
:root{
  --primary:#0a2b5f;
  --primary-dark:#081f45;
  --accent:#2563eb;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --radius:18px;
  --shadow:0 18px 40px rgba(15,23,42,.10);
  --shadow-hover:0 24px 48px rgba(15,23,42,.12);
  --gradient-primary:linear-gradient(135deg,var(--primary),var(--primary-dark));
  --glass-bg:rgba(255,255,255,0.95);
  --glass-border:rgba(255,255,255,0.2);
  scrollbar-width:thin;
  scrollbar-color:rgba(15,23,42,0.1) transparent;
}

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,"Segoe UI",system-ui,sans-serif;
}
html{
  scroll-behavior:smooth;
}
body{
  background:linear-gradient(135deg,#f0f4f8 0%,#f8fafc 50%,#f1f5f9 100%);
  color:var(--text);
  overflow-x:hidden;
  font-feature-settings:"kern" 1,"liga" 1;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  top:-50%;
  right:-20%;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(37,99,235,0.08) 0%,transparent 70%);
  border-radius:50%;
  z-index:-1;
  animation:float 15s ease-in-out infinite;
}

@media(max-width:768px){
  html{
    overflow-x:hidden;
  }
  body{
    width:100vw;
    overflow-x:hidden;
    position:relative;
  }
}

/* ================= HEADER (PREMIUM STYLE) ================= */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:linear-gradient(135deg,#0a2b5f 0%,#1e3a8a 100%);
  padding:16px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 15px 40px rgba(15,23,42,0.12);
  backdrop-filter:blur(30px);
  border-bottom:1px solid rgba(255,255,255,0.15);
  animation:slideDown 0.5s ease-out;
}

@keyframes slideDown {
  from {
    opacity:0;
    transform:translateY(-20px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}

.logo{
  height:60px;
  background:linear-gradient(135deg,#fff,#f8fafc);
  padding:8px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(15,23,42,0.04);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  cursor:pointer;
  animation:fadeInUp 0.6s ease-out;
}

.logo:hover{
  transform:scale(1.1) translateY(-3px);
  box-shadow:0 10px 30px rgba(15,23,42,0.12);
}

/* ================= NAV ================= */
.nav{
  display:flex;
  gap:16px;
  align-items:center;
  animation:fadeInUp 0.6s ease-out 0.1s both;
}

.nav a{
  color:#e0e7ff;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  position:relative;
  padding:11px 20px;
  border-radius:12px;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  overflow:hidden;
}

.nav a::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s ease;
}

.nav a::after{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  width:0;
  height:2px;
  background:linear-gradient(90deg,rgba(255,255,255,0.5),rgba(255,255,255,0.8));
  transition:width 0.3s cubic-bezier(0.4,0,0.2,1);
}

.nav a:hover{
  background:rgba(255,255,255,0.15);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  color:#fff;
  border-color:rgba(255,255,255,0.3);
}

.nav a:hover::before{
  left:100%;
}

.nav a:hover::after,
.nav a.active::after{
  width:100%;
}

.nav a.active{
  background:rgba(255,255,255,0.2);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  color:#fff;
  border-color:rgba(255,255,255,0.4);
}

.logout{
  color:#ffd1d1;
  background:rgba(255,255,255,0.1);
}

.logout:hover{
  background:rgba(255,255,255,0.2);
  color:#fff;
  border-color:rgba(255,255,255,0.3);
}

/* ================= HAMBURGER ================= */
.hamburger{
  display:none;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
  padding:10px;
  border-radius:12px;
  transition:all 0.3s ease;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
}

.hamburger:hover{
  background:rgba(255,255,255,0.2);
  box-shadow:0 2px 8px rgba(15,23,42,0.04);
}

.hamburger span{
  width:24px;
  height:2.5px;
  background:#fff;
  border-radius:2px;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  transform-origin:center;
}

.hamburger.open span:nth-child(1){
  transform:rotate(45deg) translate(8px,8px);
}

.hamburger.open span:nth-child(2){
  opacity:0;
  transform:translateX(-10px);
}

.hamburger.open span:nth-child(3){
  transform:rotate(-45deg) translate(7px,-7px);
}

/* ================= HEADER MOBILE FIX ================= */
@media(max-width:768px){
  .header{
    box-shadow:none !important;
    backdrop-filter:none !important;
    border-bottom:1px solid rgba(255,255,255,0.05) !important;
    padding:12px 16px;
  }
}

/* ================= MOBILE NAV ================= */
@media(max-width:768px){
  .hamburger{display:flex;}
  .nav{
    position:fixed;
    top:0;
    left:-300px;
    height:100vh;
    width:300px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    flex-direction:column;
    padding-top:100px;
    transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow:none;
    backdrop-filter:blur(10px);
  }
  body.nav-open::before{
    content:'';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:999;
  }
  .nav.open{
    left:0;
  }
  .nav a{
    padding:16px 24px;
    margin:4px 16px;
    border-radius:12px;
    border-bottom:none;
    transition:all 0.3s ease;
  }
  .nav a:hover{
    background:rgba(255,255,255,0.15);
    transform:translateX(8px);
  }
}
.page-head {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  justify-content: space-between;
  align-items: flex-start;
  padding: 24px 0 12px;
}

.page-head h1 {
  margin: 0;
  font-size: clamp(2rem, 2.4vw, 2.4rem);
}

.page-head p {
  margin: 8px 0 0;
  max-width: 760px;
  color: var(--muted);
  line-height: 1.7;
}

.mail-layout {
  display: grid;
  grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
  gap: 24px;
  margin-top: 18px;
}

.mail-list {
  background: var(--card-bg);
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  box-shadow: 0 18px 50px rgba(15,23,42,.06);
  overflow: hidden;
}

.mail-list .panel-head {
  padding: 22px 24px;
  border-bottom: 1px solid #eff6ff;
}

.mail-tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.tab {
  border: 1px solid #cbd5e1;
  border-radius: 999px;
  background: white;
  color: #334155;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 13px;
}

.tab.active {
  background: var(--accent);
  color: #ffffff;
  border-color: transparent;
}

.mail-item {
  display: grid;
  gap: 10px;
  padding: 18px 22px;
  border-bottom: 1px solid #f1f5f9;
  cursor: pointer;
  transition: background .2s, transform .2s;
}

.mail-item:last-child {
  border-bottom: none;
}

.mail-item:hover {
  background: #f8fbff;
  transform: translateX(1px);
}

.mail-item.active {
  background: var(--accent-soft);
}

.mail-item .sender {
  font-weight: 700;
  color: #0f172a;
}

.mail-item .subject {
  color: #334155;
  font-size: 14px;
}

.mail-item .preview {
  color: var(--muted);
  font-size: 13px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.mail-item .time {
  color: #94a3b8;
  font-size: 12px;
}

.mail-panel {
  background: var(--card-bg);
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  box-shadow: 0 18px 50px rgba(15,23,42,.06);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.mail-panel .panel-head {
  padding: 24px;
  border-bottom: 1px solid #eff6ff;
}

.mail-panel .panel-body {
  padding: 0 24px 24px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.mail-meta {
  display: grid;
  gap: 8px;
  margin-bottom: 22px;
}

.mail-meta .subject-title {
  margin: 0;
  font-size: 1.7rem;
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  color: #64748b;
  font-size: 14px;
}

.badge {
  background: #eef2ff;
  color: #1d4ed8;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.email-body {
  color: #334155;
  line-height: 1.9;
  white-space: pre-line;
  margin-bottom: 22px;
}

.attachment-card {
  border: 1px solid #dbeafe;
  border-radius: 18px;
  background: #f8fbff;
  overflow: hidden;
  margin-bottom: 22px;
}

.attachment-card img {
  width: 100%;
  display: block;
  object-fit: cover;
}

.attachment-card .attachment-info {
  padding: 16px;
}

.attach-title {
  margin: 0 0 8px;
  font-weight: 700;
}

.attach-desc {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.reply-bar {
  margin-top: auto;
  display: grid;
  gap: 12px;
}

.reply-bar textarea {
  width: 100%;
  min-height: 130px;
  border: 1px solid #cbd5e1;
  border-radius: 18px;
  padding: 18px;
  resize: vertical;
  font-family: Inter, sans-serif;
}

.reply-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.reply-actions button {
  border: none;
  border-radius: 14px;
  padding: 12px 18px;
  font-weight: 700;
  cursor: pointer;
}

.reply-actions .send {
  background: var(--accent);
  color: white;
}

.reply-actions .discard {
  background: #e2e8f0;
  color: #334155;
}

@media (max-width: 860px) {
  .mail-layout { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .header-bar { flex-direction: column; align-items: stretch; }
  .header-bar nav { justify-content: center; }
}
</style>

<main class="container">

  </section>

    <section class="mail-list" aria-label="Mail list">
      <div class="panel-head">

        <div class="mail-tabs">
          <button class="tab active" type="button">Inbox</button>
        </div>
      </div>

    </section>

    <section class="mail-panel" aria-label="Mail detail">

            <span id="time">—</span>
            <span class="badge">Unread</span>
          </div>
        </div>
      </div>
      <div class="panel-body">
        <div class="email-body" id="body">Choose an email from the left panel to see the full message here.</div>
        <div id="attachment"></div>
        <div class="reply-bar">
          <label for="replyBox" style="font-weight:700;color:#334155;">Reply</label>
          <textarea id="replyBox" placeholder="Write your response..."></textarea>
          <div class="reply-actions">
            <button class="send" onclick="sendReply()">Send Reply</button>
            <button class="discard" onclick="discardReply()" type="button">Discard</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>

const mailList = document.getElementById('mailList');
const subjectEl = document.getElementById('subject');
const senderEl = document.getElementById('sender');
const timeEl = document.getElementById('time');
const bodyEl = document.getElementById('body');
const attachmentEl = document.getElementById('attachment');
const replyBox = document.getElementById('replyBox');

function loadMails() {
  mailList.innerHTML = '';
  emails.forEach((mail, index) => {
    const item = document.createElement('article');
    item.className = 'mail-item';
    item.innerHTML = `
      <div class="sender">${mail.sender}</div>
      <div class="subject">${mail.subject}</div>
      <div class="preview">${mail.preview}</div>
      <div class="time">${mail.time}</div>
    `;
    item.addEventListener('click', () => openMail(index, item));
    mailList.appendChild(item);
  });
}

function openMail(index, element) {
  document.querySelectorAll('.mail-item').forEach(node => node.classList.remove('active'));
  element.classList.add('active');

  const mail = emails[index];
  subjectEl.innerText = mail.subject;
  senderEl.innerHTML = `From: <strong>${mail.sender}</strong>`;
  timeEl.innerText = mail.time;
  bodyEl.innerText = mail.body;

  if (mail.attachment) {
    attachmentEl.innerHTML = `
      <div class="attachment-card">
        <img src="${mail.attachment.src}" alt="${mail.attachment.name}">
        <div class="attachment-info">
          <p class="attach-title">${mail.attachment.name}</p>
          <p class="attach-desc">${mail.attachment.description}</p>
        </div>
      </div>
    `;
  } else {
    attachmentEl.innerHTML = '';
  }
}

function sendReply() {
  if (!replyBox.value.trim()) return;
  alert('Reply Sent ✅');
  replyBox.value = '';
}

function discardReply() {
  replyBox.value = '';
}

loadMails();

// Hamburger Menu Toggle
const hamburger = document.querySelector('.hamburger');
const nav = document.querySelector('.nav');
if (hamburger && nav) {
  hamburger.addEventListener('click', () => nav.classList.toggle('open'));
  hamburger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      nav.classList.toggle('open');
    }
  });
}
</script>
